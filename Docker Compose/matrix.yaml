services:
  postgres:
    image: postgres:16-alpine
    container_name: matrix-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: "your-password" # Generate one with openssl rand -base64 32
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - /your-path/matrix/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - matrix

  synapse:
    image: matrixdotorg/synapse:v1.148.0
    container_name: matrix-synapse
    dns:
      - 1.1.1.1
      - 9.9.9.9
    ports:
      - "8008:8008"
    depends_on:
      - postgres
    environment:
      SYNAPSE_SERVER_NAME: "your-domain.com"
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_CONFIG_DIR: /data
      UID: "991"
      GID: "991"
    volumes:
      - /your-path/matrix/synapse:/data
    restart: unless-stopped
    networks:
      - matrix
    # no ports: expose only via reverse proxy on the same host/network

networks:
  matrix:
    name: matrix
