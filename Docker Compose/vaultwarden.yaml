version: "3"
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - 2103:80 #map any custom port to use (replace 9445 not 80)
    volumes:
      - /your-path/vaultwarden:/data:rw
    environment:
      #     - ROCKET_TLS={certs="/ssl/certs/certs.pem",key="/ssl/private/key.pem"}  // Environment variable is specific to the Rocket web server
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURITY=${SMTP_SECURITY}
      - SMTP_TIMEOUT=${SMTP_TIMEOUT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DOMAIN=${DOMAIN}

  bitwarden-portal:
    image: reaper0x1/bitwarden-portal:latest
    container_name: bitwarden-portal
    environment:
      # Put your cron schedule.
      - CRON_SCHEDULE=0 0 * * *
      # Your timezone.
      - TZ=Europe/Berlin
      # This is the password used to encrypt and decrypt the backup files.
      - ENCRYPTION_PASSWORD=your-password
      # Your Bitwarden/Vaultwarden SOURCE login info.
      - SOURCE_ACCOUNT=your-email@example.com
      - SOURCE_PASSWORD=your-password
      # You can find these two in Account Settings -> Security -> Keys.
      - SOURCE_CLIENT_ID=your-client-id
      - SOURCE_CLIENT_SECRET=your-client-secret
      # Your source server domain/IP.
      - SOURCE_SERVER=https://vault.bitwarden.eu
      # Your Bitwarden/Vaultwarden DESTINATION login info.
      - DEST_ACCOUNT=your-email@example.com
      - DEST_PASSWORD=your-password
      # You can find these two in Account Settings -> Security -> Keys.
      - DEST_CLIENT_ID=your-client-id
      - DEST_CLIENT_SECRET=your-client-secret
      # Your source server domain/IP.
      - DEST_SERVER=http://vaultwarden #Can be https://vaultwarden.myserver.local if using self-signed certificate.
      # The users belongs to process and files.
      - PUID=1000
      - PGID=1000
      # Enable/Disable backups pruning (false/true)
      - ENABLE_PRUNING=true
      # Your retention policy for backup files. Backup older than this value will be deleted.
      - RETENTION_DAYS=30
      # If all your backups are older than RETENTION_DAYS, keep the following minimum files.
      - MIN_FILES=10
    volumes:
      - /your-path/bitwarden-portal:/app/backups
    restart: unless-stopped

#uncomment below network part if you are using Nginx Proxy Manager, or you can remove the same
networks:
  default:
    external:
      name: your-npm-network
