services:
  ghost:
    image: ghost:5-alpine
    restart: always
    ports:
      - 9000:2368
    environment:
      # see https://ghost.org/docs/config/#configuration-options
      database__client: mysql
      database__connection__host: db
      database__connection__user: root
      database__connection__password: your-password # Generate one with openssl rand -hex 32
      database__connection__database: ghost
      # this url value is just an example, and is likely wrong for your environment!
      url: https://blog.example.com/
      # contrary to the default mentioned in the linked documentation, this image defaults to NODE_ENV=production (so development mode needs to be explicitly specified if desired)
      #NODE_ENV: development
      mail__transport: your-protocol
      mail__options__host: your-host
      mail__options__port: your-port
      mail__options__secure: boolean
      mail__options__auth__user: your-username
      mail__options__auth__pass: your-password
      mail__from: you@example.com
    volumes:
      - /your-path/ghost/app:/var/lib/ghost/content

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your-password # The same as the database__connection__password value
    volumes:
      - /your-path/ghost/db:/var/lib/mysql

volumes:
  ghost:
  db:
